server:
  port: 8081

spring:
  application:
    name: organization-service
    security:
      jwt:
        # This MUST be the exact same 256-bit (32+ character) string used in your Auth Service!
        secret-key: "2f6b3d4f5c6e7a8b9c0d1e2f3a4b5c6d7e8f9a0b"

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: jdbc:postgresql://localhost:5433/org_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health, metrics